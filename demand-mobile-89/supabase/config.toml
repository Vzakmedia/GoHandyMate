
project_id = "iexcqvcuzmmiruqcssdz"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_manual_linking = false

[auth.smtp]
sender_name = "GoHandyMate"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_email_change_enabled = true

[auth.email.template.confirmation]
subject = "Your GoHandyMate verification code"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your GoHandyMate password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your GoHandyMate sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Confirm your new GoHandyMate email"
content_path = "./supabase/templates/email_change.html"

[db]
port = 54322
shadow_port = 54320
major_version = 17

[functions.get-professionals]
verify_jwt = false

[functions.handyman-jobs]
verify_jwt = true

[functions.quote-operations]
verify_jwt = true

[functions.reset-monthly-jobs]
verify_jwt = false

[functions.job-ratings]
verify_jwt = true

[functions.handyman-enhanced-profile]
verify_jwt = true

[storage]
enabled = true
file_size_limit = "50MiB"
